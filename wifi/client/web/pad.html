<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Phone Touchpad</title>
  <style>
    :root {
      --bg: #0a0a0c;
      --surface: #141418;
      --border: #2a2a32;
      --text: #f2f2f7;
      --muted: #8e8e93;
      --accent: #0a84ff;
      --ok: #30d158;
      --warn: #ff9f0a;
      --touch: rgba(10, 132, 255, 0.25);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      overflow: hidden;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
    }

    .app {
      display: flex;
      flex-direction: column;
      height: 100%;
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
    }

    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: var(--muted);
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--warn);
    }

    .dot.connected { background: var(--ok); }

    .toolbar {
      display: flex;
      gap: 8px;
    }

    button.icon-btn {
      border: 1px solid var(--border);
      background: #1c1c22;
      color: var(--text);
      border-radius: 10px;
      padding: 8px 12px;
      font-size: 13px;
      cursor: pointer;
    }

    button.icon-btn.active {
      border-color: var(--accent);
      color: var(--accent);
    }

    #pad {
      flex: 1;
      position: relative;
      background:
        radial-gradient(circle at 20% 20%, rgba(10, 132, 255, 0.06), transparent 40%),
        radial-gradient(circle at 80% 80%, rgba(48, 209, 88, 0.04), transparent 35%),
        var(--bg);
      overflow: hidden;
    }

    #pad::before {
      content: "";
      position: absolute;
      inset: 24px;
      border: 1px dashed var(--border);
      border-radius: 24px;
      pointer-events: none;
      opacity: 0.5;
    }

    .hint {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.6;
      pointer-events: none;
      transition: opacity 0.3s;
    }

    .hint.hidden { opacity: 0; }

    .touch-dot {
      position: absolute;
      width: 44px;
      height: 44px;
      margin-left: -22px;
      margin-top: -22px;
      border-radius: 50%;
      background: var(--touch);
      border: 2px solid rgba(10, 132, 255, 0.5);
      pointer-events: none;
      transform: scale(0.85);
      opacity: 0;
      will-change: transform, left, top;
    }

    .touch-dot.show {
      opacity: 1;
      transform: scale(1);
    }

    .voice-btn {
      position: absolute;
      bottom: calc(24px + env(safe-area-inset-bottom));
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      border: 2px solid var(--border);
      background: #1c1c22;
      color: var(--text);
      border-radius: 999px;
      padding: 14px 36px;
      font-size: 16px;
      font-weight: 600;
      touch-action: none;
      -webkit-user-select: none;
      user-select: none;
    }

    .voice-btn.active {
      border-color: var(--ok);
      background: rgba(48, 209, 88, 0.18);
      color: var(--ok);
    }

    .main-area {
      flex: 1;
      position: relative;
      overflow: hidden;
    }

    .view-panel {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
    }

    .view-panel.hidden {
      display: none;
    }

    #arrowPanel {
      align-items: center;
      justify-content: center;
      background: var(--bg);
      padding: 24px;
    }

    .dpad-hint {
      color: var(--muted);
      font-size: 14px;
      margin-bottom: 28px;
      text-align: center;
      line-height: 1.6;
    }

    .dpad {
      display: grid;
      grid-template-columns: repeat(3, 88px);
      grid-template-rows: repeat(3, 88px);
      gap: 12px;
    }

    .dpad-btn {
      border: 2px solid var(--border);
      background: #1c1c22;
      color: var(--text);
      border-radius: 18px;
      font-size: 28px;
      font-weight: 600;
      touch-action: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .dpad-btn.active {
      border-color: var(--accent);
      background: rgba(10, 132, 255, 0.15);
      color: var(--accent);
    }

    .dpad-up { grid-column: 2; grid-row: 1; }
    .dpad-left { grid-column: 1; grid-row: 2; }
    .dpad-right { grid-column: 3; grid-row: 2; }
    .dpad-down { grid-column: 2; grid-row: 3; }

  </style>
</head>
<body>
  <div class="app">
    <header>
      <div class="status">
        <span class="dot" id="dot"></span>
        <span id="statusText">连接中...</span>
      </div>
      <div class="toolbar">
        <button class="icon-btn" id="btnMode" title="切换触控板/方向键">方向键</button>
        <button class="icon-btn" id="btnSens" title="灵敏度">灵敏度</button>
        <button class="icon-btn" id="btnScroll" title="双指滚动模式">滚动</button>
        <button class="icon-btn" id="btnKeyboard" title="打开键盘">键盘</button>
      </div>
    </header>
    <div class="main-area">
    <div id="pad" class="view-panel">
      <div class="hint" id="hint">
        单指移动光标<br />
        单击 / 双击点击<br />
        双指上滑 · 页面向上 · 双指下滑 · 页面向下<br />
        双指轻点 = 右键<br />
        建议用 Safari 打开，避免内置浏览器断连
      </div>
      <div class="touch-dot" id="touchDot"></div>
      <button type="button" class="voice-btn" id="btnVoice" title="按住说话（Ctrl+Alt）">说话</button>
    </div>
    <div id="arrowPanel" class="view-panel hidden">
      <p class="dpad-hint">按住方向键发送到电脑<br />松开即释放</p>
      <div class="dpad">
        <button type="button" class="dpad-btn dpad-up" data-key="up" aria-label="上">↑</button>
        <button type="button" class="dpad-btn dpad-left" data-key="left" aria-label="左">←</button>
        <button type="button" class="dpad-btn dpad-right" data-key="right" aria-label="右">→</button>
        <button type="button" class="dpad-btn dpad-down" data-key="down" aria-label="下">↓</button>
      </div>
    </div>
    </div>
  </div>

  <script>
    const pad = document.getElementById("pad");
    const dot = document.getElementById("dot");
    const statusText = document.getElementById("statusText");
    const hint = document.getElementById("hint");
    const touchDot = document.getElementById("touchDot");
    const btnSens = document.getElementById("btnSens");
    const btnScroll = document.getElementById("btnScroll");
    const btnKeyboard = document.getElementById("btnKeyboard");
    const btnVoice = document.getElementById("btnVoice");
    const btnMode = document.getElementById("btnMode");
    const padPanel = document.getElementById("pad");
    const arrowPanel = document.getElementById("arrowPanel");
    const dpadButtons = document.querySelectorAll(".dpad-btn");

    const VOICE_KEYS = ["ctrl", "alt"];
    let inputMode = localStorage.getItem("pt_mode") || "pad";
    const heldArrowKeys = new Set();

    let ws = null;
    let reconnectTimer = null;
    let keepaliveTimer = null;
    let reconnectAttempt = 0;
    let scrollMode = false;
    let sensitivity = parseFloat(localStorage.getItem("pt_sens") || "2.2");

    // 每帧合并移动/滚动，减少 WebSocket 消息数量
    let pendingDx = 0;
    let pendingDy = 0;
    let pendingScroll = 0;
    let flushRaf = null;
    let scrollFlushTimer = null;
    const SCROLL_SEND_MS = 20; // 约 50Hz 发送滚动，减轻 Wi-Fi / 服务端压力

    const LONG_PRESS_MS = 280;
    const TAP_MAX_MOVE = 12;
    const TAP_MAX_MS = 220;
    const DOUBLE_TAP_MS = 300;

    const pointers = new Map();
    let primaryId = null;
    let dragActive = false;
    let longPressTimer = null;
    let lastTapTime = 0;
    let movedSinceDown = false;
    let voiceActive = false;

    function wsUrl() {
      const proto = location.protocol === "https:" ? "wss:" : "ws:";
      return `${proto}//${location.host}/ws`;
    }

    function send(msg) {
      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify(msg));
      }
    }

    function sendCompact(text) {
      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(text);
      }
    }

    function scheduleFlush() {
      if (flushRaf !== null) return;
      flushRaf = requestAnimationFrame(flushMotion);
    }

    function scheduleScrollFlush() {
      if (scrollFlushTimer !== null) return;
      scrollFlushTimer = setTimeout(() => {
        scrollFlushTimer = null;
        flushScrollOnly();
      }, SCROLL_SEND_MS);
    }

    function flushScrollOnly(immediate = false) {
      if (scrollFlushTimer !== null) {
        clearTimeout(scrollFlushTimer);
        scrollFlushTimer = null;
      }
      if (pendingScroll === 0) return;
      const dy = pendingScroll * 0.9;
      pendingScroll = 0;
      sendCompact(`s,${dy.toFixed(1)}`);
      if (!immediate) hint.classList.add("hidden");
    }

    function flushMotion() {
      flushRaf = null;
      const s = scrollMode ? 1.0 : sensitivity;

      if (pendingDx !== 0 || pendingDy !== 0) {
        const dx = pendingDx * s;
        const dy = pendingDy * s;
        pendingDx = 0;
        pendingDy = 0;
        sendCompact(`m,${dx.toFixed(2)},${dy.toFixed(2)}`);
        hint.classList.add("hidden");
      }

      flushScrollOnly();
    }

    function queueMove(dx, dy) {
      pendingDx += dx;
      pendingDy += dy;
      scheduleFlush();
    }

    function queueScroll(dy) {
      pendingScroll += dy;
      scheduleScrollFlush();
    }

    function startKeepalive() {
      stopKeepalive();
      keepaliveTimer = setInterval(() => {
        if (ws && ws.readyState === WebSocket.OPEN) {
          send({ type: "ping" });
        }
      }, 25000);
    }

    function stopKeepalive() {
      if (keepaliveTimer) {
        clearInterval(keepaliveTimer);
        keepaliveTimer = null;
      }
    }

    function connect() {
      if (ws && (ws.readyState === WebSocket.OPEN || ws.readyState === WebSocket.CONNECTING)) return;

      const oldWs = ws;
      ws = new WebSocket(wsUrl());

      ws.onopen = () => {
        reconnectAttempt = 0;
        dot.classList.add("connected");
        statusText.textContent = "已连接";
        send({ type: "hello", device: navigator.userAgent });
        startKeepalive();
        if (oldWs && oldWs !== ws) {
          try { oldWs.close(); } catch (_) {}
        }
      };

      ws.onclose = () => {
        stopKeepalive();
        releaseAllArrowKeys();
        dot.classList.remove("connected");
        statusText.textContent = "已断开，重连中...";
        stopVoice();
        clearTimeout(reconnectTimer);
        reconnectAttempt += 1;
        const delay = Math.min(1500 * reconnectAttempt, 8000);
        reconnectTimer = setTimeout(connect, delay);
      };

      ws.onerror = () => {
        statusText.textContent = "连接失败";
      };
    }

    function showTouchVisual(x, y) {
      const rect = pad.getBoundingClientRect();
      touchDot.style.left = `${x - rect.left}px`;
      touchDot.style.top = `${y - rect.top}px`;
      touchDot.classList.add("show");
    }

    function hideTouchVisual() {
      touchDot.classList.remove("show");
    }

    function handleMove(dx, dy) {
      queueMove(dx, dy);
    }

    function handleScroll(dy) {
      queueScroll(dy);
    }

    function updateSensLabel() {
      btnSens.textContent = `×${sensitivity.toFixed(1)}`;
    }
    updateSensLabel();

    pad.addEventListener("touchstart", (e) => {
      e.preventDefault();
      for (const t of e.changedTouches) {
        pointers.set(t.identifier, { x: t.clientX, y: t.clientY, startX: t.clientX, startY: t.clientY, startTime: Date.now() });
      }

      if (pointers.size === 1) {
        primaryId = e.changedTouches[0].identifier;
        movedSinceDown = false;
        dragActive = false;
        clearTimeout(longPressTimer);
        longPressTimer = setTimeout(() => {
          if (!movedSinceDown && pointers.size === 1) {
            dragActive = true;
            send({ type: "down", button: "left" });
          }
        }, LONG_PRESS_MS);
        showTouchVisual(e.changedTouches[0].clientX, e.changedTouches[0].clientY);
      }

      if (pointers.size === 2) {
        clearTimeout(longPressTimer);
        if (dragActive) {
          send({ type: "up", button: "left" });
          dragActive = false;
        }
      }
    }, { passive: false });

    pad.addEventListener("touchmove", (e) => {
      e.preventDefault();

      if (pointers.size === 1) {
        const t = e.changedTouches[0];
        const p = pointers.get(t.identifier);
        if (!p) return;

        const dx = t.clientX - p.x;
        const dy = t.clientY - p.y;

        if (Math.abs(t.clientX - p.startX) > TAP_MAX_MOVE || Math.abs(t.clientY - p.startY) > TAP_MAX_MOVE) {
          movedSinceDown = true;
          clearTimeout(longPressTimer);
        }

        if (scrollMode) {
          handleScroll(dy);
        } else {
          handleMove(dx, dy);
        }

        p.x = t.clientX;
        p.y = t.clientY;
        showTouchVisual(t.clientX, t.clientY);
        return;
      }

      if (pointers.size >= 2) {
        let sumDy = 0;
        let count = 0;
        for (let i = 0; i < e.touches.length; i++) {
          const t = e.touches[i];
          const p = pointers.get(t.identifier);
          if (!p) continue;
          sumDy += t.clientY - p.y;
          p.x = t.clientX;
          p.y = t.clientY;
          count++;
        }
        if (count > 0) {
          handleScroll(sumDy / count);
        }
      }
    }, { passive: false });

    pad.addEventListener("touchend", (e) => {
      e.preventDefault();
      const touchCountBefore = pointers.size;

      for (const t of e.changedTouches) {
        const p = pointers.get(t.identifier);
        if (!p) continue;

        const elapsed = Date.now() - p.startTime;
        const dist = Math.hypot(t.clientX - p.startX, t.clientY - p.startY);

        if (pointers.size === 2 && elapsed < TAP_MAX_MS && dist < TAP_MAX_MOVE) {
          send({ type: "click", button: "right" });
        } else if (pointers.size === 1 && t.identifier === primaryId) {
          flushMotion();
          clearTimeout(longPressTimer);
          if (dragActive) {
            send({ type: "up", button: "left" });
            dragActive = false;
          } else if (!movedSinceDown && elapsed < TAP_MAX_MS && dist < TAP_MAX_MOVE) {
            const now = Date.now();
            if (now - lastTapTime < DOUBLE_TAP_MS) {
              send({ type: "click", button: "left", count: 2 });
              lastTapTime = 0;
            } else {
              send({ type: "click", button: "left", count: 1 });
              lastTapTime = now;
            }
          }
        }

        pointers.delete(t.identifier);
      }

      if (touchCountBefore >= 2 && pointers.size < 2) {
        flushScrollOnly(true);
      }

      if (pointers.size === 0) {
        flushMotion();
        primaryId = null;
        hideTouchVisual();
      }
    }, { passive: false });

    pad.addEventListener("touchcancel", () => {
      flushMotion();
      pointers.clear();
      primaryId = null;
      const wasDrag = dragActive;
      dragActive = false;
      clearTimeout(longPressTimer);
      hideTouchVisual();
      if (wasDrag) send({ type: "up", button: "left" });
    }, { passive: false });

    function releaseAllArrowKeys() {
      for (const key of heldArrowKeys) {
        send({ type: "key_up", key });
      }
      heldArrowKeys.clear();
      dpadButtons.forEach((btn) => btn.classList.remove("active"));
    }

    function setInputMode(mode) {
      inputMode = mode;
      localStorage.setItem("pt_mode", mode);
      const isPad = mode === "pad";
      padPanel.classList.toggle("hidden", !isPad);
      arrowPanel.classList.toggle("hidden", isPad);
      btnMode.textContent = isPad ? "方向键" : "触控板";
      btnMode.classList.toggle("active", !isPad);
      btnSens.style.display = isPad ? "" : "none";
      btnScroll.style.display = isPad ? "" : "none";
      if (!isPad) {
        stopVoice();
        releaseAllArrowKeys();
      }
    }

    function bindDpadButton(btn) {
      const key = btn.dataset.key;

      function onDown(e) {
        e.preventDefault();
        e.stopPropagation();
        if (heldArrowKeys.has(key)) return;
        heldArrowKeys.add(key);
        btn.classList.add("active");
        send({ type: "key_down", key });
      }

      function onUp(e) {
        e.preventDefault();
        e.stopPropagation();
        if (!heldArrowKeys.has(key)) return;
        heldArrowKeys.delete(key);
        btn.classList.remove("active");
        send({ type: "key_up", key });
      }

      btn.addEventListener("touchstart", onDown, { passive: false });
      btn.addEventListener("touchend", onUp, { passive: false });
      btn.addEventListener("touchcancel", onUp, { passive: false });
      btn.addEventListener("mousedown", onDown);
      btn.addEventListener("mouseup", onUp);
      btn.addEventListener("mouseleave", onUp);
    }

    dpadButtons.forEach(bindDpadButton);
    setInputMode(inputMode);

    btnMode.addEventListener("click", () => {
      setInputMode(inputMode === "pad" ? "arrows" : "pad");
    });

    btnSens.addEventListener("click", () => {
      const options = ["1.5", "2.0", "2.2", "2.8", "3.5"];
      const idx = options.findIndex(v => parseFloat(v) >= sensitivity);
      const next = options[(idx + 1) % options.length];
      sensitivity = parseFloat(next);
      localStorage.setItem("pt_sens", String(sensitivity));
      updateSensLabel();
    });

    btnScroll.addEventListener("click", () => {
      scrollMode = !scrollMode;
      btnScroll.classList.toggle("active", scrollMode);
      btnScroll.textContent = scrollMode ? "滚动中" : "滚动";
    });

    btnKeyboard.addEventListener("click", () => {
      const text = prompt("输入要发送到电脑的文字：");
      if (text) send({ type: "type", text });
    });

    function startVoice() {
      if (voiceActive) return;
      voiceActive = true;
      btnVoice.classList.add("active");
      btnVoice.textContent = "录音中…";
      send({ type: "hotkey_down", keys: VOICE_KEYS });
    }

    function stopVoice() {
      if (!voiceActive) return;
      voiceActive = false;
      btnVoice.classList.remove("active");
      btnVoice.textContent = "说话";
      send({ type: "hotkey_up", keys: VOICE_KEYS });
    }

    btnVoice.addEventListener("touchstart", (e) => {
      e.preventDefault();
      e.stopPropagation();
      startVoice();
    }, { passive: false });

    btnVoice.addEventListener("touchend", (e) => {
      e.preventDefault();
      e.stopPropagation();
      stopVoice();
    }, { passive: false });

    btnVoice.addEventListener("touchcancel", (e) => {
      e.preventDefault();
      e.stopPropagation();
      stopVoice();
    }, { passive: false });

    btnVoice.addEventListener("mousedown", (e) => {
      e.preventDefault();
      startVoice();
    });

    btnVoice.addEventListener("mouseup", (e) => {
      e.preventDefault();
      stopVoice();
    });

    btnVoice.addEventListener("mouseleave", () => {
      stopVoice();
    });

    document.addEventListener("visibilitychange", () => {
      if (document.visibilityState === "visible") {
        stopVoice();
        if (!ws || ws.readyState !== WebSocket.OPEN) {
          connect();
        }
      } else {
        stopVoice();
        releaseAllArrowKeys();
      }
    });

    window.addEventListener("online", () => connect());

    connect();
  </script>
</body>
</html>
