<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Phone Touchpad</title>
  <style>
    :root {
      --bg: #0a0a0c;
      --surface: #141418;
      --border: #2a2a32;
      --text: #f2f2f7;
      --muted: #8e8e93;
      --accent: #0a84ff;
      --ok: #30d158;
      --warn: #ff9f0a;
      --touch: rgba(10, 132, 255, 0.25);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      overflow: hidden;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
    }

    .app {
      display: flex;
      flex-direction: column;
      height: 100%;
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
    }

    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: var(--muted);
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--warn);
    }

    .dot.connected { background: var(--ok); }

    .toolbar {
      display: flex;
      gap: 8px;
    }

    button.icon-btn {
      border: 1px solid var(--border);
      background: #1c1c22;
      color: var(--text);
      border-radius: 10px;
      padding: 8px 10px;
      font-size: 12px;
      cursor: pointer;
      white-space: nowrap;
    }

    button.icon-btn.active {
      border-color: var(--accent);
      color: var(--accent);
    }

    #pad {
      flex: 1;
      position: relative;
      background:
        radial-gradient(circle at 20% 20%, rgba(10, 132, 255, 0.06), transparent 40%),
        radial-gradient(circle at 80% 80%, rgba(48, 209, 88, 0.04), transparent 35%),
        var(--bg);
      overflow: hidden;
    }

    #pad::before {
      content: "";
      position: absolute;
      inset: 24px;
      border: 1px dashed var(--border);
      border-radius: 24px;
      pointer-events: none;
      opacity: 0.5;
    }

    .hint {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.6;
      pointer-events: none;
      transition: opacity 0.3s;
    }

    .hint.hidden { opacity: 0; }

    .touch-dot {
      position: absolute;
      width: 44px;
      height: 44px;
      margin-left: -22px;
      margin-top: -22px;
      border-radius: 50%;
      background: var(--touch);
      border: 2px solid rgba(10, 132, 255, 0.5);
      pointer-events: none;
      transform: scale(0.85);
      opacity: 0;
      will-change: transform, left, top;
    }

    .touch-dot.show {
      opacity: 1;
      transform: scale(1);
    }

  </style>
</head>
<body>
  <div class="app">
    <header>
      <div class="status">
        <span class="dot" id="dot"></span>
        <span id="statusText">连接中...</span>
      </div>
      <div class="toolbar">
        <button class="icon-btn" id="btnSens" title="移动灵敏度">移动</button>
        <button class="icon-btn" id="btnScrollSens" title="上下滚动灵敏度">滚速</button>
        <button class="icon-btn" id="btnScroll" title="双指滚动模式">滚动</button>
        <button class="icon-btn" id="btnKeyboard" title="打开键盘">键盘</button>
      </div>
    </header>
    <div id="pad">
      <div class="hint" id="hint">
        单指移动光标<br />
        单击 / 双击点击<br />
        双指上滑/下滑滚动 · 点「滚速」调快慢<br />
        双指轻点 = 右键
      </div>
      <div class="touch-dot" id="touchDot"></div>
    </div>
  </div>

  <script>
    const pad = document.getElementById("pad");
    const dot = document.getElementById("dot");
    const statusText = document.getElementById("statusText");
    const hint = document.getElementById("hint");
    const touchDot = document.getElementById("touchDot");
    const btnSens = document.getElementById("btnSens");
    const btnScrollSens = document.getElementById("btnScrollSens");
    const btnScroll = document.getElementById("btnScroll");
    const btnKeyboard = document.getElementById("btnKeyboard");

    const BIN_MOVE = 1;
    const BIN_SCROLL = 2;
    const moveBuf = new ArrayBuffer(9);
    const moveView = new DataView(moveBuf);
    const scrollBuf = new ArrayBuffer(5);
    const scrollView = new DataView(scrollBuf);

    let ws = null;
    let reconnectTimer = null;
    let wakeLock = null;
    let scrollMode = false;
    let sensitivity = parseFloat(localStorage.getItem("pt_sens") || "2.2");
    let scrollSensitivity = parseFloat(localStorage.getItem("pt_scroll_sens") || "0.3");
    const SCROLL_SENS_OPTIONS = [0.15, 0.25, 0.35, 0.5, 0.7, 1.0];
    let useBinary = true;

    let pendingDx = 0;
    let pendingDy = 0;
    let pendingScroll = 0;
    let flushRaf = null;

    const LONG_PRESS_MS = 280;
    const TAP_MAX_MOVE = 12;
    const TAP_MAX_MS = 220;
    const DOUBLE_TAP_MS = 300;

    const pointers = new Map();
    let primaryId = null;
    let dragActive = false;
    let longPressTimer = null;
    let lastTapTime = 0;
    let movedSinceDown = false;

    const supportsPointer = "PointerEvent" in window;

    function wsUrl() {
      const proto = location.protocol === "https:" ? "wss:" : "ws:";
      return `${proto}//${location.host}/ws`;
    }

    async function requestWakeLock() {
      try {
        if ("wakeLock" in navigator) {
          wakeLock = await navigator.wakeLock.request("screen");
        }
      } catch (_) {}
    }

    function sendJson(msg) {
      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify(msg));
      }
    }

    function sendMoveBinary(dx, dy) {
      if (!ws || ws.readyState !== WebSocket.OPEN) return;
      if (useBinary) {
        moveView.setUint8(0, BIN_MOVE);
        moveView.setFloat32(1, dx, true);
        moveView.setFloat32(5, dy, true);
        ws.send(moveBuf);
      } else {
        ws.send(`m,${dx.toFixed(2)},${dy.toFixed(2)}`);
      }
    }

    function sendScrollBinary(dy) {
      if (!ws || ws.readyState === WebSocket.OPEN) return;
      if (useBinary) {
        scrollView.setUint8(0, BIN_SCROLL);
        scrollView.setFloat32(1, dy, true);
        ws.send(scrollBuf);
      } else {
        ws.send(`s,${dy.toFixed(2)}`);
      }
    }

    function scheduleFlush() {
      if (flushRaf !== null) return;
      flushRaf = requestAnimationFrame(flushMotion);
    }

    function flushMotion() {
      flushRaf = null;
      const s = scrollMode ? 1.0 : sensitivity;

      if (pendingDx !== 0 || pendingDy !== 0) {
        sendMoveBinary(pendingDx * s, pendingDy * s);
        pendingDx = 0;
        pendingDy = 0;
        hint.classList.add("hidden");
      }

      if (pendingScroll !== 0) {
        sendScrollBinary(pendingScroll * scrollSensitivity);
        pendingScroll = 0;
        hint.classList.add("hidden");
      }
    }

    function queueMove(dx, dy) {
      if (!dx && !dy) return;
      pendingDx += dx;
      pendingDy += dy;
      scheduleFlush();
    }

    function queueScroll(dy) {
      if (!dy) return;
      pendingScroll += dy;
      scheduleFlush();
    }

    function connect() {
      if (ws && (ws.readyState === WebSocket.OPEN || ws.readyState === WebSocket.CONNECTING)) return;

      ws = new WebSocket(wsUrl());
      ws.binaryType = "arraybuffer";

      ws.onopen = () => {
        dot.classList.add("connected");
        statusText.textContent = supportsPointer ? "已连接 · 流畅模式" : "已连接";
        sendJson({ type: "hello", device: navigator.userAgent });
        requestWakeLock();
      };

      ws.onclose = () => {
        dot.classList.remove("connected");
        statusText.textContent = "已断开，重连中...";
        clearTimeout(reconnectTimer);
        reconnectTimer = setTimeout(connect, 1500);
      };

      ws.onerror = () => {
        statusText.textContent = "连接失败";
      };
    }

    function showTouchVisual(x, y) {
      const rect = pad.getBoundingClientRect();
      touchDot.style.left = `${x - rect.left}px`;
      touchDot.style.top = `${y - rect.top}px`;
      touchDot.classList.add("show");
    }

    function hideTouchVisual() {
      touchDot.classList.remove("show");
    }

    function updateSensLabel() {
      btnSens.textContent = `移动×${sensitivity.toFixed(1)}`;
    }

    function updateScrollSensLabel() {
      btnScrollSens.textContent = `滚速×${scrollSensitivity.toFixed(2)}`;
    }

    updateSensLabel();
    updateScrollSensLabel();

    function pointerCount() {
      return pointers.size;
    }

    function applyMoveDeltas(pid, events) {
      const p = pointers.get(pid);
      if (!p) return;

      let moveDx = 0;
      let moveDy = 0;
      let scrollDy = 0;
      const multi = pointerCount() >= 2;

      for (const ev of events) {
        const dx = ev.clientX - p.x;
        const dy = ev.clientY - p.y;
        p.x = ev.clientX;
        p.y = ev.clientY;

        if (multi || scrollMode) {
          scrollDy += dy;
        } else {
          moveDx += dx;
          moveDy += dy;
        }
      }

      if (multi || scrollMode) {
        if (scrollDy) queueScroll(scrollDy);
      } else if (moveDx || moveDy) {
        queueMove(moveDx, moveDy);
      }
    }

    function onDownCommon(id, x, y) {
      pointers.set(id, { x, y, startX: x, startY: y, startTime: Date.now() });

      if (pointerCount() === 1) {
        primaryId = id;
        movedSinceDown = false;
        dragActive = false;
        clearTimeout(longPressTimer);
        longPressTimer = setTimeout(() => {
          if (!movedSinceDown && pointerCount() === 1) {
            dragActive = true;
            sendJson({ type: "down", button: "left" });
          }
        }, LONG_PRESS_MS);
        showTouchVisual(x, y);
      }

      if (pointerCount() === 2) {
        clearTimeout(longPressTimer);
        if (dragActive) {
          sendJson({ type: "up", button: "left" });
          dragActive = false;
        }
      }
    }

    function onMoveCommon(id, events, visualX, visualY) {
      const p = pointers.get(id);
      if (!p) return;

      const first = events[0];
      if (Math.abs(first.clientX - p.startX) > TAP_MAX_MOVE || Math.abs(first.clientY - p.startY) > TAP_MAX_MOVE) {
        movedSinceDown = true;
        clearTimeout(longPressTimer);
      }

      applyMoveDeltas(id, events);
      showTouchVisual(visualX, visualY);
    }

    function onUpCommon(id, x, y) {
      const p = pointers.get(id);
      if (!p) return;

      const elapsed = Date.now() - p.startTime;
      const dist = Math.hypot(x - p.startX, y - p.startY);
      const countBefore = pointerCount();

      if (countBefore === 2 && elapsed < TAP_MAX_MS && dist < TAP_MAX_MOVE) {
        sendJson({ type: "click", button: "right" });
      } else if (countBefore === 1 && id === primaryId) {
        flushMotion();
        clearTimeout(longPressTimer);
        if (dragActive) {
          sendJson({ type: "up", button: "left" });
          dragActive = false;
        } else if (!movedSinceDown && elapsed < TAP_MAX_MS && dist < TAP_MAX_MOVE) {
          const now = Date.now();
          if (now - lastTapTime < DOUBLE_TAP_MS) {
            sendJson({ type: "click", button: "left", count: 2 });
            lastTapTime = 0;
          } else {
            sendJson({ type: "click", button: "left", count: 1 });
            lastTapTime = now;
          }
        }
      }

      pointers.delete(id);

      if (pointerCount() === 0) {
        flushMotion();
        primaryId = null;
        hideTouchVisual();
      }
    }

    if (supportsPointer) {
      pad.addEventListener("pointerdown", (e) => {
        if (e.pointerType === "mouse" && e.button !== 0) return;
        e.preventDefault();
        pad.setPointerCapture(e.pointerId);
        onDownCommon(e.pointerId, e.clientX, e.clientY);
      }, { passive: false });

      pad.addEventListener("pointermove", (e) => {
        if (!pointers.has(e.pointerId)) return;
        e.preventDefault();
        const coalesced = e.getCoalescedEvents ? e.getCoalescedEvents() : [e];
        onMoveCommon(e.pointerId, coalesced, e.clientX, e.clientY);
      }, { passive: false });

      pad.addEventListener("pointerup", (e) => {
        if (!pointers.has(e.pointerId)) return;
        e.preventDefault();
        onUpCommon(e.pointerId, e.clientX, e.clientY);
        try { pad.releasePointerCapture(e.pointerId); } catch (_) {}
      }, { passive: false });

      pad.addEventListener("pointercancel", (e) => {
        if (!pointers.has(e.pointerId)) return;
        flushMotion();
        pointers.delete(e.pointerId);
        if (pointerCount() === 0) {
          primaryId = null;
          hideTouchVisual();
        }
      }, { passive: false });
    } else {
      pad.addEventListener("touchstart", (e) => {
        e.preventDefault();
        for (const t of e.changedTouches) {
          onDownCommon(t.identifier, t.clientX, t.clientY);
        }
      }, { passive: false });

      pad.addEventListener("touchmove", (e) => {
        e.preventDefault();
        for (const t of e.changedTouches) {
          if (!pointers.has(t.identifier)) continue;
          const p = pointers.get(t.identifier);
          onMoveCommon(t.identifier, [{ clientX: t.clientX, clientY: t.clientY, startX: p.startX, startY: p.startY }], t.clientX, t.clientY);
        }
      }, { passive: false });

      pad.addEventListener("touchend", (e) => {
        e.preventDefault();
        for (const t of e.changedTouches) {
          onUpCommon(t.identifier, t.clientX, t.clientY);
        }
      }, { passive: false });

      pad.addEventListener("touchcancel", () => {
        flushMotion();
        const wasDrag = dragActive;
        pointers.clear();
        primaryId = null;
        dragActive = false;
        clearTimeout(longPressTimer);
        hideTouchVisual();
        if (wasDrag) sendJson({ type: "up", button: "left" });
      }, { passive: false });
    }

    btnSens.addEventListener("click", () => {
      const options = ["1.5", "2.0", "2.2", "2.8", "3.5"];
      const idx = options.findIndex(v => parseFloat(v) >= sensitivity);
      const next = options[(idx + 1) % options.length];
      sensitivity = parseFloat(next);
      localStorage.setItem("pt_sens", String(sensitivity));
      updateSensLabel();
    });

    btnScrollSens.addEventListener("click", () => {
      const idx = SCROLL_SENS_OPTIONS.findIndex(v => v >= scrollSensitivity - 0.001);
      const next = SCROLL_SENS_OPTIONS[(idx + 1) % SCROLL_SENS_OPTIONS.length];
      scrollSensitivity = next;
      localStorage.setItem("pt_scroll_sens", String(scrollSensitivity));
      updateScrollSensLabel();
    });

    btnScroll.addEventListener("click", () => {
      scrollMode = !scrollMode;
      btnScroll.classList.toggle("active", scrollMode);
      btnScroll.textContent = scrollMode ? "滚动中" : "滚动";
    });

    btnKeyboard.addEventListener("click", () => {
      const text = prompt("输入要发送到电脑的文字：");
      if (text) sendJson({ type: "type", text });
    });

    document.addEventListener("visibilitychange", () => {
      if (document.visibilityState === "visible") {
        connect();
        requestWakeLock();
      }
    });

    connect();
  </script>
</body>
</html>
