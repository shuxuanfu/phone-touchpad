<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Phone Touchpad — 连接</title>
  <style>
    :root {
      --bg: #0f0f12;
      --card: #1a1a20;
      --border: #2d2d36;
      --text: #f5f5f7;
      --muted: #9898a0;
      --accent: #0a84ff;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      max-width: 480px;
      width: 100%;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 32px;
    }
    h1 { font-size: 24px; margin-bottom: 8px; }
    p { color: var(--muted); line-height: 1.6; margin-bottom: 20px; font-size: 15px; }
    .qr-wrap {
      background: #fff;
      border-radius: 16px;
      padding: 16px;
      display: inline-block;
      margin-bottom: 20px;
    }
    .qr-wrap img { display: block; width: 200px; height: 200px; }
    .url {
      background: #111116;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 16px;
      font-family: ui-monospace, Consolas, monospace;
      font-size: 14px;
      word-break: break-all;
      margin-bottom: 20px;
    }
    .btn {
      display: inline-block;
      background: var(--accent);
      color: #fff;
      text-decoration: none;
      padding: 14px 24px;
      border-radius: 12px;
      font-weight: 600;
      font-size: 15px;
    }
    .btn:hover { filter: brightness(1.08); }
    ol {
      margin: 20px 0 0 20px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.8;
    }
    @media (max-width: 520px) {
      .card { padding: 24px 20px; }
      h1 { font-size: 20px; }
    }
  </style>
  <script>
    if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
      location.replace("/pad");
    }
  </script>
</head>
<body>
  <div class="card">
    <h1>Phone Touchpad</h1>
    <p>用手机浏览器当 Windows 触控板。iPhone 用 Safari 打开下方链接或扫描二维码。</p>

    <div class="qr-wrap">
      <img src="/qr.png" alt="连接二维码" width="200" height="200" />
    </div>

    <div class="url" id="url">加载中...</div>

    <a class="btn" href="/pad">在手机上打开触控板</a>

    <ol>
      <li>手机和电脑连<strong>同一 Wi-Fi</strong></li>
      <li>iPhone 用 Safari 扫码或输入上面的地址 + <code>/pad</code></li>
      <li>建议添加到主屏幕，像 App 一样使用</li>
      <li>连不上时，在 Windows 防火墙里允许 Python</li>
    </ol>
  </div>
  <script>
    fetch("/api/info").then(r => r.json()).then(d => {
      document.getElementById("url").textContent = d.pad_url;
    });
  </script>
</body>
</html>
